naftiko: "1.0.0-alpha1"

info:
  label: Rainbow.AI Tiles API
  description: >-
    Global weather map tiles (256x256 PNG) via XYZ CDN for precipitation
    visualization. Supports real-time and forecasted precipitation layers,
    updated every 10 minutes.
  tags:
    - Weather
    - Tiles
    - Mapping
    - Visualization
    - Geospatial
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RAINBOW_AI_API_KEY: RAINBOW_AI_API_KEY

capability:
  consumes:
    - type: http
      namespace: tiles
      baseUri: https://api.rainbow.ai/v1
      description: Rainbow.AI Tiles API for weather map visualization
      authentication:
        type: apikey
        key: Ocp-Apim-Subscription-Key
        value: "{{RAINBOW_AI_API_KEY}}"
        placement: header
      resources:
        - name: map-tiles
          path: /map/tile/{z}/{x}/{y}
          description: XYZ weather map tiles
          operations:
            - name: get-map-tile
              method: GET
              description: Get a 256x256 precipitation map tile
              inputParameters:
                - name: z
                  in: path
                  type: integer
                  required: true
                  description: Zoom level (0-18)
                - name: x
                  in: path
                  type: integer
                  required: true
                  description: Tile X coordinate
                - name: y
                  in: path
                  type: integer
                  required: true
                  description: Tile Y coordinate
                - name: timestamp
                  in: query
                  type: string
                  required: false
                  description: ISO 8601 forecast timestamp
                - name: layer
                  in: query
                  type: string
                  required: false
                  description: Layer type (precipitation or radar)
              outputRawFormat: binary

        - name: map-snapshot
          path: /map/snapshot
          description: Static precipitation map images
          operations:
            - name: get-map-snapshot
              method: GET
              description: Get a static precipitation map snapshot for a bounding box
              inputParameters:
                - name: bbox
                  in: query
                  type: string
                  required: true
                  description: Bounding box as minLon,minLat,maxLon,maxLat
                - name: width
                  in: query
                  type: integer
                  required: false
                  description: Output image width in pixels
                - name: height
                  in: query
                  type: integer
                  required: false
                  description: Output image height in pixels
                - name: timestamp
                  in: query
                  type: string
                  required: false
                  description: ISO 8601 forecast timestamp
              outputRawFormat: binary

        - name: map-timestamps
          path: /map/timestamps
          description: Available tile timestamps
          operations:
            - name: get-available-timestamps
              method: GET
              description: Get list of available tile timestamps for animation
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: rainbow-tiles-rest
      resources:
        - path: /v1/map/tiles/{z}/{x}/{y}
          name: map-tiles
          description: Weather map tiles
          operations:
            - method: GET
              name: get-map-tile
              description: Get XYZ weather map tile
              call: "tiles.get-map-tile"
              with:
                z: "rest.z"
                x: "rest.x"
                y: "rest.y"
                timestamp: "rest.timestamp"
                layer: "rest.layer"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/map/snapshots
          name: map-snapshots
          description: Static precipitation map snapshots
          operations:
            - method: GET
              name: get-map-snapshot
              description: Get static precipitation map image
              call: "tiles.get-map-snapshot"
              with:
                bbox: "rest.bbox"
                width: "rest.width"
                height: "rest.height"
                timestamp: "rest.timestamp"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/map/timestamps
          name: map-timestamps
          description: Available tile timestamps
          operations:
            - method: GET
              name: get-available-timestamps
              description: Get available tile timestamps for animation
              call: "tiles.get-available-timestamps"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: rainbow-tiles-mcp
      transport: http
      tools:
        - name: get-map-tile
          description: Get a 256x256 XYZ weather map tile for map integration
          hints:
            readOnly: true
            openWorld: true
          call: "tiles.get-map-tile"
          with:
            z: "tools.z"
            x: "tools.x"
            y: "tools.y"
            timestamp: "tools.timestamp"
            layer: "tools.layer"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-map-snapshot
          description: Get static precipitation map snapshot for a geographic bounding box
          hints:
            readOnly: true
            openWorld: true
          call: "tiles.get-map-snapshot"
          with:
            bbox: "tools.bbox"
            width: "tools.width"
            height: "tools.height"
            timestamp: "tools.timestamp"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-available-timestamps
          description: Get available tile timestamps for building animated weather visualizations
          hints:
            readOnly: true
            openWorld: false
          call: "tiles.get-available-timestamps"
          outputParameters:
            - type: object
              mapping: "$."
