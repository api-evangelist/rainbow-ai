naftiko: "1.0.0-alpha1"

info:
  label: Rainbow.AI Nowcast API
  description: >-
    Hyperlocal minute-by-minute precipitation forecasts for any global location
    at 1 km resolution, updated every 10 minutes, covering up to 4 hours ahead.
  tags:
    - Weather
    - Nowcast
    - Precipitation
    - Forecasting
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RAINBOW_AI_API_KEY: RAINBOW_AI_API_KEY

capability:
  consumes:
    - type: http
      namespace: nowcast
      baseUri: https://api.rainbow.ai/v1
      description: Rainbow.AI Nowcast API for hyperlocal precipitation forecasting
      authentication:
        type: apikey
        key: Ocp-Apim-Subscription-Key
        value: "{{RAINBOW_AI_API_KEY}}"
        placement: header
      resources:
        - name: nowcast
          path: /weather/nowcast
          description: Minute-by-minute precipitation forecasts
          operations:
            - name: get-nowcast
              method: GET
              description: Get precipitation nowcast for a location
              inputParameters:
                - name: lat
                  in: query
                  type: number
                  required: true
                  description: Latitude (-90 to 90)
                - name: lon
                  in: query
                  type: number
                  required: true
                  description: Longitude (-180 to 180)
                - name: timezone
                  in: query
                  type: string
                  required: false
                  description: IANA timezone identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: radar
          path: /weather/radar
          description: Real-time radar data
          operations:
            - name: get-radar-data
              method: GET
              description: Get real-time radar data for a location
              inputParameters:
                - name: lat
                  in: query
                  type: number
                  required: true
                  description: Latitude (-90 to 90)
                - name: lon
                  in: query
                  type: number
                  required: true
                  description: Longitude (-180 to 180)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: rainbow-nowcast-rest
      resources:
        - path: /v1/nowcast
          name: nowcast
          description: Precipitation nowcast for a location
          operations:
            - method: GET
              name: get-nowcast
              description: Get minute-by-minute precipitation forecast
              call: "nowcast.get-nowcast"
              with:
                lat: "rest.lat"
                lon: "rest.lon"
                timezone: "rest.timezone"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/radar
          name: radar
          description: Real-time radar data
          operations:
            - method: GET
              name: get-radar-data
              description: Get radar reflectivity data
              call: "nowcast.get-radar-data"
              with:
                lat: "rest.lat"
                lon: "rest.lon"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: rainbow-nowcast-mcp
      transport: http
      tools:
        - name: get-nowcast
          description: Get minute-by-minute precipitation forecast for a location
          hints:
            readOnly: true
            openWorld: true
          call: "nowcast.get-nowcast"
          with:
            lat: "tools.lat"
            lon: "tools.lon"
            timezone: "tools.timezone"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-radar-data
          description: Get real-time radar reflectivity data for a location
          hints:
            readOnly: true
            openWorld: true
          call: "nowcast.get-radar-data"
          with:
            lat: "tools.lat"
            lon: "tools.lon"
          outputParameters:
            - type: object
              mapping: "$."
