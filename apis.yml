apis:
- aid: rainbow-ai:rainbow-ai-nowcast
  name: Rainbow.AI Nowcast API
  description: The Nowcast API delivers hyperlocal precipitation forecasts with minute-by-minute predictions for the next
    4 hours at 1 km spatial resolution. It returns precipitation type and intensity for any global coordinate, updated every
    10 minutes.
  humanURL: https://doc.rainbow.ai
  baseURL: https://api.rainbow.ai/v1
